version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-icadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-icpassword123!}
      POSTGRES_DB: ${POSTGRES_DB:-intercontinental_crest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-icadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ic_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ic_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ic_network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ic_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ic_network

  # NestJS Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ic_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-icadmin}:${POSTGRES_PASSWORD:-icpassword123!}@postgres:5432/${POSTGRES_DB:-intercontinental_crest}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass123}@redis:6379
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey!changeme}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-refreshsecret!changeme}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ic_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ic_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ic_network

volumes:
  postgres_data:
  redis_data:

networks:
  ic_network:
    driver: bridge
